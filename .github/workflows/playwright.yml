name: VegaStars Playwright CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # API tests run in CI — no geo-restriction on API endpoints
      - name: Run API tests
        run: npx playwright test tests/api.spec.js --workers=1
        env:
          CI: true

      # UI tests skipped in CI due to geo-restriction on vegastars5.com
      # Site blocks non-AU/NZ IPs — run locally or on AU-based CI runner
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30